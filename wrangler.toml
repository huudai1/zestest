name = "zestest-api"
main = "src/index.ts"
compatibility_date = "2026-05-02"

# 1. Cấu hình để chạy dọn rác tự động (thay cho APScheduler)
[triggers]
crons = ["0 0 * * *"] # Chạy vào 0h sáng mỗi ngày

# 2. Cấu hình Database (thay cho init_db trong Python)
[[d1_databases]]
binding = "DB"
database_name = "zestest_db"
database_id = "dán-cái-id-lấy-từ-dashboard-vào-đây"
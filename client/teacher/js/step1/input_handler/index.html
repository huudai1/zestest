<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test PDF to WebP - Zestest Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #007bff; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        #log { text-align: left; background: #000; font-family: monospace; font-size: 12px; padding: 10px; height: 300px; overflow-y: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #444; color: #00ff88; }
        .stats-box { display: flex; justify-content: space-between; margin: 15px 0; font-weight: bold; color: #ffa500; }
        input[type="file"] { margin: 20px 0; width: 100%; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background: #444; cursor: not-allowed; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .preview-grid img { width: 100%; border: 1px solid #555; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 PDF to WebP Tester</h2>
    <p style="font-size: 12px; color: #aaa;">Giữ nguyên scale: 2, quality: 0.8</p>
    
    <input type="file" id="pdf-input" accept="application/pdf">
    <button id="process-btn">BẮT ĐẦU XỬ LÝ</button>

    <div class="stats-box">
        <span>Tổng file: <span id="total-pages">0</span> trang</span>
        <span>Dung lượng: <span id="total-size">0</span> MB</span>
    </div>

    <div id="log">Sẵn sàng...</div>
    <div class="preview-grid" id="preview"></div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    const logEl = document.getElementById('log');
    const previewEl = document.getElementById('preview');
    const sizeEl = document.getElementById('total-size');
    const pagesEl = document.getElementById('total-pages');

    function addLog(msg) {
        const div = document.createElement('div');
        div.innerText = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function processPdfToWebp(file) {
        if (!pdfjsLib.GlobalWorkerOptions.workerSrc) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        addLog(`Đang đọc file PDF: ${file.name}`);
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const webpBlobs = [];
        let totalBytes = 0;

        addLog(`Tổng số trang: ${pdf.numPages}`);
        pagesEl.innerText = pdf.numPages;
        previewEl.innerHTML = '';

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1 }); 

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;

            const blob = await new Promise(resolve => 
                canvas.toBlob(resolve, 'image/webp', 0.5)
            );
            
            webpBlobs.push(blob);
            totalBytes += blob.size;

            // Log chi tiết từng trang
            const pageSizeMB = (blob.size / (1024 * 1024)).toFixed(2);
            addLog(`Trang ${i}: ${pageSizeMB} MB`);
            sizeEl.innerText = (totalBytes / (1024 * 1024)).toFixed(2);

            // Preview nhanh
            const img = document.createElement('img');
            img.src = URL.createObjectURL(blob);
            previewEl.appendChild(img);

            // Giải phóng RAM canvas ngay lập tức
            canvas.width = 0; canvas.height = 0;
        }

        addLog(`--- HOÀN TẤT ---`);
        addLog(`Tổng cộng: ${(totalBytes / (1024 * 1024)).toFixed(2)} MB`);
        return webpBlobs;
    }

    document.getElementById('process-btn').onclick = async function() {
        const file = document.getElementById('pdf-input').files[0];
        if (!file) return alert("Chọn file PDF cái đã!");
        
        this.disabled = true;
        this.innerText = "ĐANG XỬ LÝ...";
        try {
            await processPdfToWebp(file);
        } catch (e) {
            addLog(`LỖI: ${e.message}`);
        }
        this.disabled = false;
        this.innerText = "BẮT ĐẦU XỬ LÝ";
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard V2 - Zestest</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/zestest-main.css">
</head>
<body>

<div class="mobile-container">
    <div class="top-bar">
        <div class="lang-dropdown">
    <button class="lang-dropbtn" onclick="toggleLangMenu()">
        <span id="current-lang-flag">🇻🇳</span>
        <span id="current-lang-code">VI</span>
        <i class="arrow-down"></i>
    </button>
    <div id="lang-content" class="lang-dropdown-content">
        <div class="lang-item" onclick="I18n.setLocale('vi')">
            <span>🇻🇳</span> Tiếng Việt
        </div>
        <div class="lang-item" onclick="I18n.setLocale('en')">
            <span>🇺🇸</span> English
        </div>
        <div class="lang-item" onclick="I18n.setLocale('jp')">
            <span>🇯🇵</span> 日本語
        </div>
    </div>
</div>
        <div class="switch-container-header">
            <input type="checkbox" id="mode-toggle">
            <label for="mode-toggle" class="switch-label-header">
                <span class="text-light" data-i18n="light">LIGHT</span>
                <span class="text-dark" data-i18n="dark">DARK</span>
            </label>
        </div>
        <div class="badge" data-i18n="user">Guest</div>
        <button class="btn-register">Register</button>
    </div>

    <div id="card-overlay" class="transition-overlay">
        <div id="scene-background" class="scene-bg"></div>
        <div class="card-scene">
            <div id="flying-card" class="card">
                <div class="card-face card-front"><div class="icon-circle">☀️</div></div>
                <div class="card-face card-back"><div class="icon-circle">🌙</div></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
    </div>

    <div class="banner">
        <span>Banner (Click để nhận 3 lượt)</span>
    </div>

    <button class="btn-create" onclick="DashboardManager.goToCreate()" data-i18n="create_btn">Create</button>
    <div class="badge" data-i18n="total_exams">Tổng số đề: 0 / 3</div>

    <div class="section-header">
        <h2 data-i18n="all_exams">All Exams</h2>
<input type="text" class="search-bar" data-i18n-placeholder="search" placeholder="Search...">
    </div>

    <div class="exam-list" id="exam-container">
        </div>
</div>

<div id="contactModal" class="modal-overlay" onclick="if(event.target === this) toggleContactModal()">
    <div class="modal-box contact-box">
        <h3 data-i18n="contact_title">Liên hệ Zestest</h3>
        <p data-i18n="contact_desc">Gặp khó khăn khi tạo đề? Kết nối ngay với mình nhé!</p>
        <div class="contact-links">
            <a href="https://zalo.me/your_phone" class="contact-item zalo">Zalo</a>
            <a href="mailto:support@zestest.vn" class="contact-item mail">Email</a>
            <a href="https://facebook.com/zestest" class="contact-item fb">Facebook Community</a>
        </div>
        <button class="btn-done" style="margin-top: 15px; width: 100%;" onclick="toggleContactModal()">Đóng</button>
    </div>
</div>

<div class="floating-contact" onclick="toggleContactModal()">
    <svg class="contact-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 11.5C21 6.52944 16.9706 2.5 12 2.5C7.02944 2.5 3 6.52944 3 11.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M21 11.5C21 12.6046 20.1046 13.5 19 13.5H17C15.8954 13.5 15 12.6046 15 11.5V10.5C15 9.39543 15.8954 8.5 17 8.5H19C20.1046 8.5 21 9.39543 21 10.5V11.5Z" fill="currentColor"/>
        <path d="M3 11.5C3 12.6046 3.89543 13.5 5 13.5H7C8.10457 13.5 9 12.6046 9 11.5V10.5C9 9.39543 8.10457 8.5 7 8.5H5C3.89543 8.5 3 9.39543 3 10.5V11.5Z" fill="currentColor"/>
        <path d="M15 13.5C15 15.7091 13.2091 17.5 11 17.5H9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="contact-tooltip">Hỗ trợ Zestest</div>
</div>

<script src="/static/js/storage_manager.js"></script>
<script src="/static/js/session_manager.js"></script>

<script src="/static/js/dashboard/package_engine.js"></script>
<script src="/static/js/dashboard/dashboard_manager.js"></script>

<script src="/static/js/dashboard/dashboard_render.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/i18n.js"></script>

</body>
</html>
